name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - "mkdocs.yml"
      - "requirements.txt"
      - "scripts/build-incident-card-pdf.ts"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs-site/**"
      - "mkdocs.yml"
      - "requirements.txt"
      - "scripts/build-incident-card-pdf.ts"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Cloudflare Pages publish requires:
#   - CLOUDFLARE_API_TOKEN (Pages:Edit)
#   - CLOUDFLARE_ACCOUNT_ID
# Set on a Pages project named "qualitymate-docs" with custom domain
# docs.qualitymate.com.au.

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python deps
        run: pip install mkdocs-material

      - run: npm ci

      - name: Build incident-card PDF
        run: npm run docs:incident-card

      - name: Build MkDocs site
        run: mkdocs build

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: site
          retention-days: 14

      - name: Deploy to Cloudflare Pages
        if: github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=qualitymate-docs --branch=main
