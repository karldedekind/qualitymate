name: Promote RC → stable

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "promote" to confirm RC → stable retag'
        required: true
        default: ""

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  promote:
    if: ${{ inputs.confirm == 'promote' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      packages: write
      contents: read
    steps:
      - name: Lowercase image name
        id: img
        run: echo "name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag :1-stable-rc → :1-stable (no rebuild)
        run: |
          set -euo pipefail
          SRC="${REGISTRY}/${{ steps.img.outputs.name }}:1-stable-rc"
          DST="${REGISTRY}/${{ steps.img.outputs.name }}:1-stable"
          docker buildx imagetools create -t "$DST" "$SRC"
